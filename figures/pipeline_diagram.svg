<svg width="100%" viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Evidence -->
<g>
  <rect x="220" y="30" width="240" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C" x="340" y="52" text-anchor="middle" dominant-baseline="central">Evidence e</text>
</g>

<line x1="340" y1="74" x2="340" y2="108" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- VAE Encoder -->
<g>
  <rect x="220" y="108" width="240" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C" x="340" y="130" text-anchor="middle" dominant-baseline="central">VAE encoder</text>
</g>

<line x1="340" y1="152" x2="340" y2="186" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- q(z|e) -->
<g>
  <rect x="200" y="186" width="280" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="340" y="208" text-anchor="middle" dominant-baseline="central">q(z | e) ~ N(μ, σ²)</text>
</g>

<line x1="340" y1="230" x2="340" y2="264" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#555" x="352" y="250" dominant-baseline="central">Monte Carlo sampling</text>

<!-- Samples -->
<g>
  <rect x="180" y="264" width="320" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="340" y="286" text-anchor="middle" dominant-baseline="central">z⁽¹⁾, z⁽²⁾, … , z⁽ᴹ⁾</text>
</g>

<line x1="340" y1="308" x2="340" y2="342" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#555" x="352" y="328" dominant-baseline="central">Decode each sample</text>

<!-- Decoded -->
<g>
  <rect x="110" y="342" width="460" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="340" y="364" text-anchor="middle" dominant-baseline="central">p(y|z⁽¹⁾), p(y|z⁽²⁾), … , p(y|z⁽ᴹ⁾)</text>
</g>

<line x1="340" y1="386" x2="340" y2="420" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#555" x="352" y="406" dominant-baseline="central">Aggregate</text>

<!-- Soft factor -->
<g>
  <rect x="200" y="420" width="280" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#633806" x="340" y="442" text-anchor="middle" dominant-baseline="central">Φₑ(y) = soft factor</text>
</g>

<!-- Fork -->
<line x1="340" y1="464" x2="340" y2="486" stroke="#888" stroke-width="1.5"/>
<line x1="170" y1="486" x2="510" y2="486" stroke="#888" stroke-width="1.5"/>
<line x1="170" y1="486" x2="170" y2="534" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="510" y1="486" x2="510" y2="534" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- LPF-SPN -->
<g>
  <rect x="70" y="534" width="200" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#711B13" x="170" y="556" text-anchor="middle" dominant-baseline="central">LPF-SPN</text>
  <text font-family="sans-serif" font-size="12" fill="#993C1D" x="170" y="574" text-anchor="middle" dominant-baseline="central">SPN reasoning over factors</text>
</g>

<!-- LPF-Learned -->
<g>
  <rect x="410" y="534" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489" x="510" y="556" text-anchor="middle" dominant-baseline="central">LPF-Learned</text>
  <text font-family="sans-serif" font-size="12" fill="#534AB7" x="510" y="574" text-anchor="middle" dominant-baseline="central">Neural aggregation</text>
</g>

<!-- Merge -->
<line x1="170" y1="590" x2="170" y2="706" stroke="#888" stroke-width="1.5"/>
<line x1="510" y1="590" x2="510" y2="706" stroke="#888" stroke-width="1.5"/>
<line x1="170" y1="706" x2="340" y2="706" stroke="#888" stroke-width="1.5"/>
<line x1="510" y1="706" x2="340" y2="706" stroke="#888" stroke-width="1.5"/>
<line x1="340" y1="706" x2="340" y2="720" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Final -->
<g>
  <rect x="185" y="720" width="310" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="340" y="742" text-anchor="middle" dominant-baseline="central">P(y | all evidence)</text>
</g>

</svg>

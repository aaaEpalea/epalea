name: Protect Pretrained Assets

on:
  pull_request:
    branches: [main]

jobs:
  check-protected-paths:
    name: Block changes to pretrained/ and user_workspace/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for forbidden path changes
        run: |
          CHANGED=$(git diff --name-only origin/main HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^(pretrained/|user_workspace/)'; then
            echo ""
            echo "::error::PRs may not modify pretrained/ or user_workspace/"
            echo "::error::See CONTRIBUTING.md for accepted contribution types."
            exit 1
          fi

          echo "✓ No protected paths modified."

  run-tests:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -e ".[dev]" --quiet
      - name: Run tests
        run: pytest tests/ -v --tb=short
        continue-on-error: true
